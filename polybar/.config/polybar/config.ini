[colors]
background = #282A36
background-alt = #44475A
foreground = #F8F8F2
primary = #BD93F9
secondary = #8BE9FD
alert = #FF5555
disabled = #6272A4

[bar/main]
width = 100%
height = 24pt
radius = 6

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace:size=10;2

modules-left = xworkspaces xwindow
modules-right = audio-device pulseaudio battery internet memory cpu date

[module/internet]
type = custom/script
exec = ~/.config/polybar/network_status.sh
interval = 5
click-left = ~/.config/polybar/network_menu.sh
label = "%output%"
label-foreground = ${colors.primary}

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <label-charging> <animation-charging>
format-charging-prefix = "BAT "
format-charging-prefix-foreground = ${colors.primary}
label-charging = %percentage%%

animation-charging-0 = [+..]
animation-charging-1 = [.+.]
animation-charging-2 = [..+]
animation-charging-framerate = 1000

format-discharging = <label-discharging>
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.primary}
label-discharging = %percentage%% [...]

format-full-prefix = "BAT "
format-full-prefix-foreground = ${colors.primary}
label-full = %percentage%%

format-low-prefix = "BAT "
format-low-prefix-foreground = ${colors.alert}
label-low = %percentage%%

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/audio-device]
type = custom/script
exec = wpctl inspect @DEFAULT_AUDIO_SINK@ | grep "node.nick" | awk -F'\"' '{print $2}'
interval = 1
label = "%output%"
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
